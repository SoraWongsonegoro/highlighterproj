<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* Primary font is Cambria, small numeric/text UI uses Arial */
        body {
            width: 520px;
            height: 560px;
            font-family: Cambria, "Times New Roman", serif;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #111;
            padding: 12px;
        }

        /* --- Tab Bar --- */
        #tab-bar {
            display: flex;
            gap: 18px;
            padding: 6px 0 12px 0;
            align-items: center;
            border-bottom: 1px solid #e6e6e6;
            margin-bottom: 8px;
        }
        .tab {
            padding: 5px 10px;
            color: #222;
            cursor: pointer;
            font-size: 13px;
            font-family: Cambria, "Times New Roman", serif;
            user-select: none;
            border-radius: 3px;
        }
        .tab.active {
            background: #c21b1b;
            color: #fff;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.05);
            padding: 6px 12px;
        }
        .sort-toggle {
            margin-left: auto;
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            background: #f4f4f4;
            color: #111;
            cursor: pointer;
            font-size: 13px;
            font-family: Cambria, "Times New Roman", serif;
        }
        .sort-toggle:hover {
            background: #e8e8e8;
        }
        .search-input {
            flex: 1;
            min-width: 160px;
            padding: 7px 10px;
            border: 1px solid #d1d1d1;
            border-radius: 8px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            color: #111;
            background: #fafafa;
        }
        .search-input:focus {
            outline: none;
            border-color: #c21b1b;
            background: white;
        }

        /* --- Pages --- */
        #page-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .page {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 4px 2px 16px 2px;
            overflow-y: auto;
        }
        .page.active { display: flex; }

        /* --- Toolbar row (search + add collection) --- */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-shrink: 0;
            position: relative;
            overflow: visible;
        }
        .toolbar-icon {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 10px;
            background: #f4f4f4;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #111;
            font-size: 18px;
            font-weight: 700;
            line-height: 1;
        }
        .toolbar-icon:hover { background: #eaeaea; }
        #new-collection-popup {
            position: absolute;
            top: 50px;
            right: 0;
            background: white;
            border: 1px solid #d8d8d8;
            box-shadow: 0 8px 24px rgba(0,0,0,0.14);
            border-radius: 12px;
            padding: 14px;
            display: none;
            width: 260px;
            z-index: 999;
        }
        #new-collection-popup.visible { display: block; }
        #new-collection-popup::before {
            content: '';
            position: absolute;
            top: -7px;
            right: 20px;
            width: 14px;
            height: 14px;
            background: white;
            transform: rotate(45deg);
            border-left: 1px solid #d8d8d8;
            border-top: 1px solid #d8d8d8;
        }
        #new-collection-popup input {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid #d1d1d1;
            border-radius: 8px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            margin-bottom: 10px;
            background: #fafafa;
        }
        #new-collection-popup input:focus {
            outline: none;
            border-color: #c21b1b;
            background: white;
        }
        #new-collection-popup button {
            position: absolute;
            right: 14px;
            bottom: 14px;
            width: 38px;
            height: 38px;
            padding: 0;
            border: none;
            border-radius: 50%;
            background: #ffffff;
            color: #111;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
            transition: background 120ms ease, transform 120ms ease;
        }
        #new-collection-popup button:hover {
            background: #c21b1b;
            transform: translateY(-1px);
        }
        #new-collection-popup button svg path {
            stroke: currentColor;
        }

        /* --- Removed clear button (UI requirement) --- */

        /* --- Section headers --- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 4px;
            font-weight: bold;
            font-size: 13px;
            color: #333;
            margin: 8px 0 6px 0;
        }
        .section-header .chevron { font-size: 11px; color: #666; }
        .delete-btn {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 12px;
            padding: 0 0 0 8px;
        }
        .delete-btn:hover { color: #a71d2a; }

        /* --- Snippet cards --- */
        .snippet-list { margin-bottom: 8px; }
        .snippet-card {
            background: transparent;
            padding: 9px 4px;
            margin: 0;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #dcdcdc;
            position: relative;
            padding-top: 14px;
        }
        .snippet-body { flex: 1; min-width: 0; }
        .snippet-title { display:block; font-size:12px; font-weight:700; color:#111; font-family:Cambria, "Times New Roman", serif; margin-bottom:4px; }
        .snippet-text { word-wrap: break-word; color: #111; font-size:17px; line-height:1.28; font-family: Cambria, "Times New Roman", serif; margin-bottom:4px; }
        .search-highlight { background: #fff09e; color: #111; padding: 0 2px; border-radius: 2px; }
        .snippet-source { display:block; font-size:11px; color:#666; font-family:Arial, sans-serif; }

        /* Small icon actions in upper-right of each snippet card */
        .card-actions {
            position: absolute;
            top: 6px;
            right: 6px;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .icon-btn {
            width: 22px;
            height: 22px;
            padding: 2px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .icon-btn svg { width: 16px; height: 16px; }
        .snippet-controls {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 90px;
        }
        .move-select {
            font-size: 11px;
            padding: 2px;
            border: 1px solid #ccc;
            border-radius: 3px;
            width: 100%;
        }
        .move-btn {
            font-size: 11px;
            padding: 3px 6px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            width: 100%;
        }
        .move-btn:hover { background: #0056b3; }

        /* --- Collection page --- */
        /* Collections grid with vertical cards */
        #collections-list {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            grid-auto-rows: minmax(86px, auto);
            gap: 10px;
            align-items: start;
            width: 100%;
        }

        .collection-card {
            background: white;
            border: 1px solid #e6e6e6;
            border-radius: 10px;
            padding: 12px 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            min-height: 86px;
            position: relative;
        }
        .collection-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
        .collection-card .card-actions {
            position: absolute;
            bottom: 8px;
            right: 8px;
            top: auto;
        }
        .collection-card .meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .collection-card .title { font-family: Cambria, "Times New Roman", serif; font-size:16px; font-weight:700; line-height:1.3; }
        .collection-card .count { font-family: Arial, sans-serif; font-size:11px; color:#666; }
        .collection-card .chev { font-size:22px; color:#111; }
        .page-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #dadada;
            background: transparent;
        }
        .page-item:last-child { border-bottom: none; }
        .page-item .meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .page-item .title { font-family: Cambria, "Times New Roman", serif; font-size:16px; font-weight:700; line-height:1.2; color:#111; }
        .page-item .count { font-family: Arial, sans-serif; font-size:11px; color:#666; letter-spacing: 0.1px; }
        .page-item .chev { font-size:24px; color:#111; }
        #page-count-header { font-size: 12px; font-family: Arial, sans-serif; color: #555; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 0.9px; }

        /* --- Collection detail (back button + snippets) --- */
        #back-btn {
            background: none;
            border: none;
            color: #007bff;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 10px;
            padding: 0;
            flex-shrink: 0;
        }
        #back-btn:hover { text-decoration: underline; }
        .back-btn {
            background: none;
            border: none;
            color: #007bff;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 10px;
            padding: 0;
            flex-shrink: 0;
        }
        .back-btn:hover { text-decoration: underline; }
        #collection-detail-title {
            font-size: 15px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .empty-msg {
            font-size: 13px;
            color: #888;
            padding: 6px 0;
        }

        /* Small UI text (counts, numbers) should use Arial per spec */
        .small-count { font-family: Arial, sans-serif; }

        /* Quick fade animation for appearing elements */
        .fade { opacity: 0; animation: fadeIn 180ms ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- Tab Bar -->
    <div id="tab-bar">
        <div class="tab active" data-tab="all">All View</div>
        <div class="tab" data-tab="by-site">Page View</div>
        <div class="tab" data-tab="collections">Collections View</div>
        <input id="search-input" class="search-input" type="search" placeholder="Search keywords..." aria-label="Search quotes" />
        <button id="sort-toggle" class="sort-toggle" title="Toggle sort order">Sort: Date</button>
    </div>

    <!-- Page Container -->
    <div id="page-container">

        <!-- All Quotes -->
        <div class="page active" id="page-all">
            <div id="all-quotes-list"></div>
        </div>

        <!-- By Website -->
        <div class="page" id="page-by-site">
            <div id="by-site-list"></div>

            <!-- Page Detail (hidden until a page is clicked) -->
            <div id="page-detail" style="display:none; flex-direction:column; height:100%;">
                <button id="page-back-btn" class="back-btn">&lt; Back</button>
                <div id="page-detail-title" style="font-weight:bold; margin-bottom:8px;"></div>
                <div id="page-detail-list"></div>
            </div>
        </div>

        <!-- Collections -->
        <div class="page" id="page-collections">
            <div class="toolbar">
                <button id="show-collection-popup" class="toolbar-icon" title="New collection">+</button>
                <div id="new-collection-popup">
                    <input id="new-collection-input" type="text" placeholder="New collection name..." />
                    <button id="new-collection-btn" title="Create collection">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M8 9h8M8 13h8M8 17h5" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="collections-list"></div>

            <!-- Collection Detail (hidden until a collection is clicked) -->
            <div id="collection-detail" style="display:none; flex-direction:column; height:100%;">
                <button id="back-btn">← Back</button>
                <div id="collection-detail-title"></div>
                <div id="collection-detail-list"></div>
            </div>
        </div>

    </div>
    <div id="pager-row" style="display:none; align-items:center; justify-content:center; gap:12px; padding:8px 0 6px 0; border-top:1px solid #eee; margin-top:6px;">
        <button id="pager-prev" style="background:none;border:none;font-family:Arial,sans-serif;cursor:pointer">&lt;</button>
        <div id="pager-info" class="small-count"></div>
        <button id="pager-next" style="background:none;border:none;font-family:Arial,sans-serif;cursor:pointer">&gt;</button>
    </div>

    <!-- Quote Detail Modal -->
    <div id="quote-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:999; align-items:center; justify-content:center;">
        <div style="background:white; border-radius:12px; padding:22px; width:420px; max-height:480px; display:flex; flex-direction:column; box-shadow:0 4px 20px rgba(0,0,0,0.2);">
            <div id="quote-modal-context-before" style="font-size:12px; color:#666; font-style:italic; line-height:1.5; padding-bottom:8px; font-family:Cambria,'Times New Roman',serif; display:none;"></div>
            <div id="quote-modal-text" style="font-size:17px; color:#111; font-weight:700; line-height:1.6; padding:12px 0; border-top:2px solid #c21b1b; border-bottom:2px solid #c21b1b; margin:4px 0; word-wrap:break-word; font-family:Cambria,'Times New Roman',serif;"></div>
            <div id="quote-modal-context-after" style="font-size:12px; color:#666; font-style:italic; line-height:1.5; padding-top:8px; font-family:Cambria,'Times New Roman',serif; display:none;"></div>
            <div id="quote-modal-saved-at" style="font-size:12px; color:#666; margin-top:10px; font-family:Arial,sans-serif; display:none;"></div>
            <a id="quote-modal-source" target="_blank" style="font-size:11px; color:#666; font-family:Arial,sans-serif; margin-top:8px; display:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-decoration:none;"></a>
            <button id="quote-modal-cancel" style="margin-top:14px; width:100%; padding:8px; background:#f4f4f4; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-family:Arial,sans-serif;">Close</button>
        </div>
    </div>
    
    <!-- Move Modal -->
    <div id="move-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:999; align-items:center; justify-content:center;">
        <div style="background:white; border-radius:8px; padding:18px; width:260px; box-shadow:0 4px 20px rgba(0,0,0,0.2);">
            <div style="font-weight:bold; font-size:14px; margin-bottom:12px; color:#333;">Move to collection</div>
            <div id="move-modal-options"></div>
            <button id="move-modal-cancel" style="margin-top:12px; width:100%; padding:7px; background:#e9ecef; border:none; border-radius:4px; cursor:pointer; font-size:13px;">Cancel</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
